name: Native Package Transcript Audit

on:
  push:
    paths:
      - "src/pyAppGen/targets.py"
      - "src/pyAppGen/gen.py"
      - ".github/workflows/native-package-transcripts.yml"
  pull_request:
    paths:
      - "src/pyAppGen/targets.py"
      - "src/pyAppGen/gen.py"
      - ".github/workflows/native-package-transcripts.yml"
  workflow_dispatch:

jobs:
  native-package-transcripts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install package
        run: python -m pip install -e .

      - name: Validate native package transcript audit
        run: appgen --target-binary-adapter-audit
